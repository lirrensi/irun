name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: build & publish release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Extract version
        id: ver
        run: echo "tag=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build matrix
        env:
          VERSION: ${{ steps.ver.outputs.tag }}
        run: |
          mkdir -p dist
          for pair in "windows amd64 .exe" "linux amd64" "linux arm64" "darwin amd64" "darwin arm64"; do
            set -- $pair
            GOOS=$1 GOARCH=$2 go build -trimpath -ldflags="-s -w" \
              -o dist/iRUN${3}-${VERSION}-$1-$2${3} .
            GOOS=$1 GOARCH=$2 go build -trimpath -ldflags="-s -w" \
              -o dist/iRUN-find${3}-${VERSION}-$1-$2${3} ./find
            GOOS=$1 GOARCH=$2 go build -trimpath -ldflags="-s -w" \
              -o dist/sshr${3}-${VERSION}-$1-$2${3} ./sshr
          done
          ls -la dist

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
